<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IA WEEK</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
      }
      ul {
        list-style: none;
      }
      a {
        text-decoration: none;
        color: #ccc;
        font-size: 30px;
        cursor: pointer;
      }
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #root > section:first-of-type {
        width: 95%;
        display: flex;
        justify-content: center;
      }
      section:first-of-type > div {
        width: 12%;
        height: 100px;
        border: 1px solid black;
        border-right: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      section:first-of-type > div:last-child {
        border-right: 1px solid black;
      }
      p {
        font-size: 12px;
      }
      section:last-of-type {
        width: 95%;
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }
      section:last-of-type > div ul {
        /* width: 100%; */
        display: flex;
      }
    </style>
  </head>
  <body>
    <!-- [ ] 아아 이번주 달력 -->
    <!-- index페이지 : 
      한 주
      마지막 칸에 이번 주 총 커피샷, 커피값 나옴 
      마신 날엔 표에 체크 표시-->
    <!-- [ ] 추가하기 버튼으로 form태그 입력 페이지 이동 -->
    <!-- 추가할 내용 : 날짜, 커피 브랜드, 아아 샷 개수, 가격 -->
    <!-- [ ]표로 요약 보여주기 :
       지막에 한달 동안 소비한 커피샷, 커피값 나옴
       소비한 커피 브랜드 (태그처럼) 보여주기-->
    <div id="root">
      <h1>이번 주 아아</h1>
      <section>
        <div>
          <p>월</p>
          <a href="/plus.html">+</a>
        </div>
        <div>
          <p>화</p>
          <a href="/plus.html">+</a>
        </div>
        <div>
          <p>수</p>
          <a href="/plus.html">+</a>
        </div>
        <div>
          <p>목</p>
          <a href="/plus.html">+</a>
        </div>
        <div>
          <p>금</p>
          <a href="/plus.html">+</a>
        </div>
        <div>
          <p>토</p>
          <a href="/plus.html">+</a>
        </div>
        <div>
          <p>일</p>
          <a href="/plus.html">+</a>
        </div>
        <div>
          <p><span>7</span>샷</p>
          <p><span>10000</span>원</p>
        </div>
      </section>
      <section>
        <div>
          <h3>브랜드</h3>
          <ul>
            <li>맘모스 커피</li>
            <li>우지 커피</li>
            <li>빽다방</li>
          </ul>
        </div>
        <div>
          <h3>이번 주 정리</h3>
          <ul>
            <li>7샷</li>
            <li>10000원</li>
          </ul>
        </div>
      </section>
    </div>
    <script></script>
  </body>
</html>
