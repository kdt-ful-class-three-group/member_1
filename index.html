<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IA WEEK</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
      }
      ul {
        list-style: none;
      }
      a {
        text-decoration: none;
        color: #ccc;
        font-size: 30px;
        cursor: pointer;
      }
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #root > section:first-of-type {
        width: 95%;
        display: flex;
        justify-content: center;
      }
      section:first-of-type > div {
        width: 12%;
        height: 100px;
        border: 1px solid black;
        border-right: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      section:first-of-type > div:last-child {
        border-right: 1px solid black;
      }
      p {
        font-size: 12px;
      }
      section:last-of-type {
        width: 95%;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      section:last-of-type > div ul {
        width: 100%;
        display: flex;
        gap: 20px;
      }
      section:last-of-type > div:first-child ul > li:first-child {
        background-color: #eee;
      }
      section:last-of-type > div:first-child ul > li:nth-child(2) {
        background-color: bisque;
      }
      section:last-of-type > div:first-child ul > li:last-child {
        background-color: paleturquoise;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <h1>이번 주 아아</h1>
      <section>
        <div>
          <p>월</p>
          <a href="plus.html">+</a>
        </div>
        <div>
          <p>화</p>
          <a href="plus.html">+</a>
        </div>
        <div>
          <p>수</p>
          <a href="plus.html">+</a>
        </div>
        <div>
          <p>목</p>
          <a href="plus.html">+</a>
        </div>
        <div>
          <p>금</p>
          <a href="plus.html">+</a>
        </div>
        <div>
          <p>토</p>
          <a href="plus.html">+</a>
        </div>
        <div>
          <p>일</p>
          <a href="plus.html">+</a>
        </div>
        <div>
          <p><span>7</span>샷</p>
          <p><span>10000</span>원</p>
        </div>
      </section>
      <section>
        <div>
          <h3>브랜드</h3>
          <ul>
            <li>맘모스 커피</li>
            <li>우지 커피</li>
            <li>빽다방</li>
          </ul>
        </div>
        <div>
          <h3>이번 주 정리</h3>
          <ul>
            <li>7샷</li>
            <li>10000원</li>
          </ul>
        </div>
      </section>
    </div>
    <script></script>
  </body>
</html>
