<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IA PLUS</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100vh;
      }
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #root > section {
        width: 95%;
        display: flex;
        justify-content: center;
        border: 1px solid black;
        border-radius: 10px;
      }
      #root > section > form {
        /* width: 100%; */
        display: flex;
        flex-direction: column;
        /* justify-content: center; */
        /* align-items: center; */
        gap: 10px;
        margin: 10px 0;
      }
      #root > section > form input {
        font-size: 14px;
      }
      #root > section > form > div:first-of-type > input {
        width: 120%;
      }
      #root > section > form button {
        height: 30px;
        width: 100px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <h1>아아 샷 추가</h1>
      <section>
        <form action="/add" method="post">
          <label for="brand"
            >커피 브랜드 :
            <input type="text" name="brand" placeholder="커피 브랜드" />
          </label>
          <div>
            <label for="shot"
              >샷 :
              <input type="number" name="shot" placeholder="샷" />
            </label>
            <label for="price">
              가격 :
              <input
                type="text"
                name="price"
                placeholder="숫자만 입력해주세요"
              />
            </label>
          </div>
          <button type="submit">추가하기</button>
        </form>
      </section>
    </div>
  </body>
</html>
